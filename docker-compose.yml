version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: gitdian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gitdian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - gitdian-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gitdian-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - gitdian-redis:/data

volumes:
  gitdian-postgres:
  gitdian-redis:
